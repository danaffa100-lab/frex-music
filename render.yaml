services:
  - type: web
    name: frex-music
    runtime: node
    buildCommand: npm install && npm run build && npm run init-db
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: frex-db
          property: connectionString

databases:
  - name: frex-db
    plan: free
